<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historic Sites of Warrington, UK</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <!-- Leaflet JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #f5f0e8;
      color: #2c2416;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #2c2416;
      color: #f5f0e8;
      padding: 14px 24px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.4rem;
      letter-spacing: 0.04em;
    }

    header span {
      font-size: 0.85rem;
      opacity: 0.6;
      font-style: italic;
    }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      width: 300px;
      flex-shrink: 0;
      overflow-y: auto;
      background: #faf7f2;
      border-right: 1px solid #d4c9b0;
    }

    .sidebar-header {
      padding: 12px 16px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #7a6a50;
      border-bottom: 1px solid #d4c9b0;
      background: #f0ebe0;
    }

    .site-card {
      padding: 14px 16px;
      border-bottom: 1px solid #e8e0d0;
      cursor: pointer;
      transition: background 0.15s;
    }

    .site-card:hover { background: #ede7d8; }
    .site-card.active { background: #d9cdb8; }

    .site-card h3 {
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    .site-card .era {
      font-size: 0.72rem;
      color: #8a7a60;
      font-style: italic;
      margin-bottom: 5px;
    }

    .site-card p {
      font-size: 0.78rem;
      color: #5a4e3c;
      line-height: 1.45;
      font-family: Arial, sans-serif;
    }

    .badge {
      display: inline-block;
      font-size: 0.65rem;
      font-family: Arial, sans-serif;
      padding: 2px 7px;
      border-radius: 10px;
      margin-top: 6px;
      font-weight: bold;
      letter-spacing: 0.03em;
    }

    .badge-I    { background: #b5432a; color: #fff; }
    .badge-II-star { background: #c97c2a; color: #fff; }
    .badge-II   { background: #5a7a3a; color: #fff; }
    .badge-other { background: #4a6a8a; color: #fff; }

    /* Map */
    #map {
      flex: 1;
    }

    /* Popup styling */
    .leaflet-popup-content-wrapper {
      border-radius: 4px;
      font-family: Georgia, serif;
    }

    .popup-title {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 4px;
      color: #2c2416;
    }

    .popup-era {
      font-size: 0.75rem;
      color: #8a7a60;
      font-style: italic;
      margin-bottom: 6px;
    }

    .popup-desc {
      font-size: 0.8rem;
      line-height: 1.5;
      color: #3c3020;
      font-family: Arial, sans-serif;
      max-width: 220px;
    }

    .popup-badge {
      margin-top: 8px;
    }

    /* Filter bar */
    .filter-bar {
      padding: 10px 16px;
      border-bottom: 1px solid #d4c9b0;
      background: #f0ebe0;
    }

    .filter-bar label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7a6a50;
      display: block;
      margin-bottom: 6px;
    }

    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .filter-btn {
      font-size: 0.7rem;
      padding: 3px 10px;
      border: 1px solid #b0a080;
      border-radius: 12px;
      background: #faf7f2;
      cursor: pointer;
      font-family: Arial, sans-serif;
      transition: all 0.15s;
    }

    .filter-btn.on { background: #2c2416; color: #f5f0e8; border-color: #2c2416; }

    footer {
      font-size: 0.68rem;
      text-align: center;
      padding: 6px;
      color: #8a7a60;
      background: #f0ebe0;
      border-top: 1px solid #d4c9b0;
      font-family: Arial, sans-serif;
      flex-shrink: 0;
    }

    footer a { color: #5a7a5a; }

    @media (max-width: 640px) {
      .layout { flex-direction: column; }
      #sidebar { width: 100%; height: 200px; border-right: none; border-bottom: 1px solid #d4c9b0; }
    }
  </style>
</head>
<body>

<header>
  <h1>Historic Sites of Warrington</h1>
  <span>Cheshire, England</span>
</header>

<div class="layout">
  <div id="sidebar">
    <div class="filter-bar">
      <label>Filter by category</label>
      <div class="filter-buttons" id="filterButtons"></div>
    </div>
    <div class="sidebar-header">Sites — click to locate on map</div>
    <div id="siteList"></div>
  </div>
  <div id="map"></div>
</div>

<footer>
  Map tiles © <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors &nbsp;|&nbsp;
  Heritage data: <a href="https://historicengland.org.uk" target="_blank">Historic England</a> &amp; <a href="https://www.warrington.gov.uk/our-heritage" target="_blank">Warrington Borough Council</a>
</footer>

<script>
  const sites = [
    {
      name: "Warrington Town Hall (Bank Hall)",
      lat: 53.3901,
      lng: -2.5877,
      era: "c. 1750",
      category: "Civic",
      grade: "I",
      description: "Originally built as 'Bank Hall' for Thomas Parr, designed by James Gibbs. Became Warrington Town Hall in 1872. The Grade I listed building sits behind the famous restored Golden Gates."
    },
    {
      name: "The Golden Gates",
      lat: 53.3899,
      lng: -2.5874,
      era: "pre-1895",
      category: "Civic",
      grade: "II",
      description: "Magnificent ornate iron gates fronting the Town Hall, recently restored. A beloved landmark of Warrington and part of the Town Hall Conservation Area."
    },
    {
      name: "Sankey Viaduct",
      lat: 53.4475,
      lng: -2.6508,
      era: "1830",
      category: "Industrial",
      grade: "II*",
      description: "Built by George Stephenson, this is the world's earliest surviving major railway viaduct, constructed for the Liverpool and Manchester Railway. A landmark of industrial heritage."
    },
    {
      name: "St Elphin's Church",
      lat: 53.3908,
      lng: -2.5802,
      era: "Medieval (rebuilt 1859)",
      category: "Religious",
      grade: "I",
      description: "One of the oldest churches in Warrington, dedicated to St Elphin, a 7th-century bishop. The current structure was largely rebuilt in the Victorian era but retains its medieval steeple."
    },
    {
      name: "Lymm Cross",
      lat: 53.3749,
      lng: -2.4757,
      era: "17th century",
      category: "Village Heritage",
      grade: "I",
      description: "A Grade I listed 17th-century sandstone cross that forms the focal point of Lymm village, which itself appeared in the Domesday Book. Surrounded by historic village buildings."
    },
    {
      name: "Walton Hall",
      lat: 53.3623,
      lng: -2.5456,
      era: "19th century",
      category: "Country House",
      grade: "II",
      description: "A Victorian country house set within Walton Gardens. Now used as a heritage centre and events venue, the hall and its grounds are a popular destination in south Warrington."
    },
    {
      name: "Warrington Museum & Library",
      lat: 53.3897,
      lng: -2.5969,
      era: "1857",
      category: "Civic",
      grade: "II",
      description: "Home to one of the oldest public libraries in England. The museum holds important local history collections and natural history specimens. The library movement in Warrington was pioneering in the UK."
    },
    {
      name: "The Barley Mow",
      lat: 53.3893,
      lng: -2.5955,
      era: "1561",
      category: "Historic Inn",
      grade: "other",
      description: "The oldest building in Warrington town centre, dating to 1561. This timber-framed building in Golden Square has survived centuries of change around it and remains a remarkable example of Tudor architecture."
    },
    {
      name: "Bewsey Old Hall",
      lat: 53.3992,
      lng: -2.6298,
      era: "Medieval",
      category: "Manor",
      grade: "II*",
      description: "The remains of a moated medieval manor house, home to the Boteler family for centuries. The surviving gatehouse and moat are remnants of a once-grand fortified hall, visible within a nature park."
    },
    {
      name: "Warrington Academy (site)",
      lat: 53.3903,
      lng: -2.5930,
      era: "1757",
      category: "Education",
      grade: "other",
      description: "The Warrington Academy, founded in 1757, was one of England's leading Dissenting academies. It attracted notable thinkers including Joseph Priestley. The site marks a key chapter in Enlightenment-era education."
    },
    {
      name: "St Mary's Church, Lymm",
      lat: 53.3763,
      lng: -2.4740,
      era: "12th century",
      category: "Religious",
      grade: "II*",
      description: "A parish church with origins in the 12th century, featuring Norman and medieval architectural elements. The church overlooks the village dam and is central to Lymm's historic character."
    },
    {
      name: "Risley Moss (Prehistoric landscape)",
      lat: 53.4285,
      lng: -2.5640,
      era: "Prehistoric",
      category: "Prehistoric",
      grade: "other",
      description: "An ancient raised bog with evidence of prehistoric human activity. Risley Moss is a Site of Special Scientific Interest and holds archaeological significance as a preserved wetland landscape."
    }
  ];

  const categories = [...new Set(sites.map(s => s.category))];
  const gradeLabels = { "I": "Grade I", "II*": "Grade II*", "II": "Grade II", "other": "Notable" };
  const gradeClass  = { "I": "badge-I", "II*": "badge-II-star", "II": "badge-II", "other": "badge-other" };

  // Map colours per category
  const catColour = {
    "Civic":          "#2c6e8a",
    "Industrial":     "#7a4a1a",
    "Religious":      "#6a2a6a",
    "Village Heritage":"#2a6a3a",
    "Country House":  "#4a5a2a",
    "Historic Inn":   "#8a3a2a",
    "Manor":          "#4a2a6a",
    "Education":      "#2a4a6a",
    "Prehistoric":    "#5a5a2a"
  };

  function markerColour(site) {
    return catColour[site.category] || "#444";
  }

  function makeIcon(colour) {
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 36" width="24" height="36">
      <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24S24 21 24 12C24 5.4 18.6 0 12 0z"
            fill="${colour}" stroke="#fff" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="5" fill="#fff" fill-opacity="0.85"/>
    </svg>`;
    return L.divIcon({
      html: svg,
      className: "",
      iconSize: [24, 36],
      iconAnchor: [12, 36],
      popupAnchor: [0, -34]
    });
  }

  // Init map
  const map = L.map("map").setView([53.3950, -2.5700], 12);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);

  // State
  let activeFilters = new Set(categories);
  let activeCard = null;
  const markers = [];

  // Build markers
  sites.forEach((site, i) => {
    const marker = L.marker([site.lat, site.lng], { icon: makeIcon(markerColour(site)) });

    const popup = `
      <div class="popup-title">${site.name}</div>
      <div class="popup-era">${site.era}</div>
      <div class="popup-desc">${site.description}</div>
      <div class="popup-badge">
        <span class="badge ${gradeClass[site.grade]}">${gradeLabels[site.grade]}</span>
      </div>`;

    marker.bindPopup(popup, { maxWidth: 260 });
    marker.addTo(map);
    markers.push({ site, marker });
  });

  // Sidebar cards
  const siteList = document.getElementById("siteList");

  function buildCards() {
    siteList.innerHTML = "";
    const visible = sites.filter(s => activeFilters.has(s.category));
    if (visible.length === 0) {
      siteList.innerHTML = `<p style="padding:16px;font-size:0.8rem;color:#8a7a60;font-family:Arial,sans-serif;">No sites match current filters.</p>`;
      return;
    }
    visible.forEach((site, idx) => {
      const card = document.createElement("div");
      card.className = "site-card";
      card.dataset.idx = idx;
      card.innerHTML = `
        <h3>${site.name}</h3>
        <div class="era">${site.era} &middot; ${site.category}</div>
        <p>${site.description.slice(0, 100)}…</p>
        <span class="badge ${gradeClass[site.grade]}">${gradeLabels[site.grade]}</span>`;

      card.addEventListener("click", () => {
        document.querySelectorAll(".site-card").forEach(c => c.classList.remove("active"));
        card.classList.add("active");
        const entry = markers.find(m => m.site === site);
        if (entry) {
          map.setView([site.lat, site.lng], 15, { animate: true });
          entry.marker.openPopup();
        }
      });

      siteList.appendChild(card);
    });
  }

  // Update marker visibility
  function updateMarkers() {
    markers.forEach(({ site, marker }) => {
      if (activeFilters.has(site.category)) {
        marker.addTo(map);
      } else {
        map.removeLayer(marker);
      }
    });
  }

  // Filter buttons
  const filterContainer = document.getElementById("filterButtons");
  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "filter-btn on";
    btn.textContent = cat;
    btn.addEventListener("click", () => {
      if (activeFilters.has(cat)) {
        activeFilters.delete(cat);
        btn.classList.remove("on");
      } else {
        activeFilters.add(cat);
        btn.classList.add("on");
      }
      updateMarkers();
      buildCards();
    });
    filterContainer.appendChild(btn);
  });

  buildCards();
</script>
</body>
</html>
